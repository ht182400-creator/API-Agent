# Weather API Docker Compose 配置
# 用于本地开发和测试环境

version: '3.8'

services:
  # Weather API 服务
  weather-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: weather-api
    restart: unless-stopped
    ports:
      - "8001:8001
    environment:
      - DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      - ../logs:/app/logs
      - ../.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - weather-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: weather-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - weather-api
    networks:
      - weather-network
    profiles:
      - production

networks:
  weather-network:
    driver: bridge

volumes:
  logs:
    driver: local
